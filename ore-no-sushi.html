const cv=document.getElementById('c'),DC=cv.getContext('2d');

const ic_rec=document.createElement('canvas');ic_rec.width=20;ic_rec.height=12;

// ===== AUDIO =====
let AC;
function ea(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume()}
function tn(f,d,t,v,dl){if(!AC)return;const s=AC.currentTime+(dl||0),o=AC.createOscillator(),g=AC.createGain();o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v||.04,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.connect(g);g.connect(AC.destination);o.start(s);o.stop(s+d)}
function noise(d,v,dl){if(!AC)return;const s=AC.currentTime+(dl||0),n=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate),dat=buf.getChannelData(0);for(let i=0;i<dat.length;i++)dat[i]=Math.random()*2-1;n.buffer=buf;const g=AC.createGain();g.gain.setValueAtTime(v||.02,s);g.gain.exponentialRampToValueAtTime(.001,s+d);n.connect(g);g.connect(AC.destination);n.start(s);n.stop(s+d)}
function sfxEatGreat(){tn(784,.12,'sine',.07);tn(988,.12,'sine',.065,.05);tn(1175,.12,'sine',.06,.1);tn(1568,.2,'sine',.055,.15);tn(2093,.25,'sine',.04,.2)}
function sfxEatGood(){tn(523,.1,'sine',.05);tn(659,.1,'sine',.045,.05);tn(784,.15,'sine',.04,.1)}

function sfxEatTerrible(){tn(110,.35,'sawtooth',.04);tn(90,.3,'sawtooth',.035,.08);noise(.1,.015,.05)}
function sfxChew(){for(let i=0;i<4;i++)tn(90+Math.random()*50,.09,'square',.012,i*.12)}
function sfxGulp(){for(let i=0;i<10;i++)tn(100+Math.random()*80,.22,'sine',.02,i*.35)}

function sfxRegister(){tn(2800,.2,'sine',.07);setTimeout(()=>{tn(1200,.1,'square',.045);tn(800,.15,'sawtooth',.035,.05);tn(500,.25,'sawtooth',.025,.1);tn(300,.4,'sawtooth',.02,.18)},300)}
function sfxCoin(){tn(1319,.06,'square',.025);tn(1568,.09,'square',.025,.07)}
function sfxDead(){tn(233,.4,'sawtooth',.04);tn(147,.6,'sawtooth',.04,.3)}
function sfxBuzz(){tn(55,.5,'sawtooth',.07);tn(58,.45,'square',.05,.02);noise(.2,.02)}
function sfxBan(){tn(150,.2,'square',.07);noise(.08,.03);tn(300,.1,'square',.04,.03)}
function sfxJingle(){tn(523,.12,'sine',.05);tn(659,.12,'sine',.045,.1);tn(784,.12,'sine',.04,.2);tn(1047,.3,'sine',.05,.3)}
function sfxScoreFanfare(){for(let i=0;i<8;i++)noise(.03,.03,i*.04);tn(523,.2,'sine',.06,.35);tn(659,.2,'sine',.055,.45);tn(784,.2,'sine',.05,.55);tn(1047,.4,'sine',.06,.65)}

// ===== BGM =====
let bgmId=null,bgmStep=0,curBGM='',bgmRate=1;
const BGMS={
title:{bpm:135,mel:[523,659,784,0,659,784,1047,0,784,659,523,659,784,0,523,0,523,659,784,0,880,784,659,0,523,392,523,0,659,523,0,0],bas:[262,0,0,196,0,0,220,0,0,0,262,0,196,0,220,0,262,0,0,196,0,0,220,0,262,0,196,0,262,0,0,0]},
play:{bpm:170,mel:[440,0,523,587,659,0,523,0,440,523,659,784,659,523,440,0,440,523,587,0,659,784,880,0,784,659,523,440,523,659,440,0,330,0,440,523,659,0,784,659,523,0,440,523,659,0,523,0,440,523,587,659,784,880,784,659,523,0,440,330,440,0,0,0],bas:[220,0,0,147,0,0,165,0,220,0,0,165,0,0,196,0,220,0,0,147,0,0,165,0,196,0,0,220,0,0,165,0,220,0,0,165,0,0,196,0,220,0,0,147,0,0,165,0,220,0,0,165,0,0,196,0,220,0,0,147,220,0,0,0]},
bill:{bpm:80,mel:[220,0,262,0,330,0,0,0,294,0,262,0,220,0,0,0,220,0,247,0,262,0,330,0,294,0,0,0,262,0,0,0],bas:[220,0,0,0,0,0,165,0,147,0,0,0,0,0,220,0,220,0,0,0,165,0,0,0,147,0,0,0,165,0,0,0]}};
function startBGM(n,r){if(curBGM===n)return;stopBGM();curBGM=n;if(!AC)return;const t=BGMS[n];if(!t)return;bgmStep=0;bgmRate=r||1;const iv=60000/t.bpm/2/bgmRate;bgmId=setInterval(()=>{const m=t.mel[bgmStep%t.mel.length];if(m)tn(m,iv/1000*.7,'triangle',.02);const b=t.bas[bgmStep%t.bas.length];if(b)tn(b,iv/1000*1.2,'sine',.014);bgmStep++},iv)}
function stopBGM(){if(bgmId)clearInterval(bgmId);bgmId=null;curBGM=''}
function updateBGMRate(r){if(!AC||curBGM!=='play')return;stopBGM();startBGM('play',r)}
let audioInited=false;
function tryInitAudio(){if(audioInited)return;audioInited=true;ea();startBGM('title')}
document.addEventListener('click',tryInitAudio,{once:false});
document.addEventListener('keydown',tryInitAudio,{once:false});

// ===== DATA =====
const PLATES=[
{nm:'水色皿',rk:0,c:'#4fc3f7',price:100,base:20},
{nm:'緑色皿',rk:1,c:'#2e7d32',price:200,base:40},
{nm:'黄色皿',rk:2,c:'#f9a825',price:300,base:60},
{nm:'赤色皿',rk:3,c:'#c62828',price:400,base:80},
{nm:'銀色皿',rk:4,c:'#9e9e9e',price:500,base:100},
{nm:'金色皿',rk:5,c:'#111',price:800,base:160}];
const PCOLS=PLATES.map(p=>p.c),PNAMES=PLATES.map(p=>p.nm),PRICES=PLATES.map(p=>p.price);
// 時価システム：ゲーム開始時にランダム決定
const PRICE_CENTERS=[100,200,300,400,500,800];
const PRICE_SPREADS=[20,50,80,120,180,300];

const NETA_DEF=[
{nm:'納豆巻',rk:0,tc:'#3e2723',gn:1},
{nm:'カッパ巻',rk:0,tc:'#4caf50',gn:1},
{nm:'ツナマヨ',rk:0,tc:'#ffcc80',gn:1},
{nm:'タマゴ',rk:0,tc:'#f9a825'},
{nm:'コハダ',rk:0,tc:'#90a4ae'},
{nm:'シメサバ',rk:1,tc:'#607d8b'},
{nm:'イカ',rk:1,tc:'#ddd'},
{nm:'エビ',rk:1,tc:'#ef9a9a'},
{nm:'マグロ',rk:1,tc:'#c62828'},
{nm:'サーモン',rk:1,tc:'#ff7043'},
{nm:'アジ',rk:2,tc:'#78909c'},
{nm:'カツオ',rk:2,tc:'#b71c1c'},
{nm:'エンガワ',rk:2,tc:'#e0e0e0'},
{nm:'ホタテ',rk:2,tc:'#fff9c4'},
{nm:'タイ',rk:3,tc:'#ffcdd2'},
{nm:'ウナギ',rk:3,tc:'#5d4037'},
{nm:'カンパチ',rk:3,tc:'#f48fb1'},
{nm:'中トロ',rk:4,tc:'#e91e63'},
{nm:'ズワイガニ',rk:4,tc:'#bf360c'},
{nm:'大トロ',rk:5,tc:'#c62828'},
{nm:'ウニ',rk:5,tc:'#e65100',gn:1}];

const NETA_BY_RK=[[],[],[],[],[],[]];
NETA_DEF.forEach(n=>NETA_BY_RK[n.rk].push(n));

// 正規分布ランダム(min,max)の間で中央寄り
function normRand(mn,mx){
let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();
const z=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
const t=Math.max(-2.5,Math.min(2.5,z));
return mn+(mx-mn)*((t+2.5)/5);
}

// 時価生成（ゲーム開始時）
function rollPrices(){
const prices=[];
for(let rk=0;rk<6;rk++){
const c=PRICE_CENTERS[rk],sp=PRICE_SPREADS[rk];
const raw=normRand(c-sp,c+sp);
prices[rk]=Math.round(raw/10)*10;}
return prices}

function rr(a,b){return a+Math.random()*(b-a)}

// レーン生成（安いほど多い＋後半は高いネタ増加＋直前2つと被らない）
let laneHist=[];
function rNLane(){
const prog=G?G.full/20:0;// 0〜1でゲーム進行度
const ws=NETA_DEF.map(n=>{
const base=3-n.rk*0.5;
const late=prog*n.rk*0.3;// 後半ほど高いネタ増
return Math.max(.05,base+late)});
for(let i=0;i<30;i++){
const tot=ws.reduce((a,b)=>a+b,0);let r=Math.random()*tot;let pick=NETA_DEF[0];
for(let j=0;j<NETA_DEF.length;j++){r-=ws[j];if(r<=0){pick=NETA_DEF[j];break}}
if(!laneHist.includes(pick.nm)){laneHist.push(pick.nm);if(laneHist.length>2)laneHist.shift();return pick}}
return NETA_DEF[Math.floor(Math.random()*NETA_DEF.length)]}

// 枚数に応じた出現可能ランク上限を返す
function maxRecRk(full){
if(full<=0)return 0;      // 水色のみ
if(full<=3)return 1;      // 緑まで
if(full<=6)return 2;      // 黄色まで
if(full<=9)return 3;      // 赤まで
return 5;}                // 金・銀まで

// おすすめ1件選ぶ（食べたネタ・現在表示中と被らない）
function pickOneRecommend(existing){
const full=G?G.full:0;
const maxRk=maxRecRk(full);
// 出現可能なネタ全体から除外リストを引いたプール
const eaten=G?G.eatenNeta:[];
const excl=existing.map(e=>e.nm).concat(eaten);
// ランク0〜maxRkの中からランダムに選ぶ（高いランクほど重みを下げる）
const pool=[];
for(let rk=0;rk<=maxRk;rk++){
const w=Math.max(1,maxRk-rk+1); // 低ランクほど重みが高い
for(const n of NETA_BY_RK[rk]){
if(!excl.includes(n.nm))for(let i=0;i<w;i++)pool.push(n);}}
if(!pool.length)return null;
return pool[Math.floor(Math.random()*pool.length)];}

// 初期おすすめ：水色×3
function genInitialRecommends(){
const rk0=NETA_BY_RK[0];
const result=[];
const used=[];
for(let i=0;i<1;i++){
const pool=rk0.filter(n=>!used.includes(n.nm));
if(!pool.length)break;
const pick=pool[Math.floor(Math.random()*pool.length)];
used.push(pick.nm);result.push(pick);}
return result;}

const HINTS=[
'おすすめを連続で食べるとコンボ発生！満足度がどんどん増える。',
'皿の値段は時価。ガリを食べると次の皿の値段が分かるかも。',
'お茶を飲むとイライラがリセット。飲み過ぎ注意（4秒操作不能）。',
'おすすめ以外を食べてもペナルティはない。でもコンボは切れる。',
'イライラが50%を超えると満足度が減り続ける。注意しよう。',
'ガリは2回まで。次に食べた皿の値段を見破れる。',
'10〜15皿がちょうどいい。少なすぎても食べすぎてもマイナス。',
'会計は3000円がベスト。安すぎても高すぎても補正がかかる。',
'後半になるほどレーンに高いネタが流れてくる。',
'おすすめのネタがレーンに見えたら素早く取ろう。',
'寿司を食べたいおっさんの後ろ姿に哀愁があっていいよね。'];

// ===== STATE =====
let G={phase:'title'};
const UBELT_Y=8,LBELT_Y=20,BODY_CY=68,MAX_LOG=7;
const PIX_OFFSET_Y=120; // ピクセルキャンバスをcanvasのどこに描画するか(Y)

function newGame(){
laneHist=[];
const gamePrices=rollPrices();
// 皿カード状態: 0=不明, 1=高め/安め, 2=確定
const cardState=[0,0,0,0,0,0]; // 0:? 1:high/low 2:fixed
const cardHint=[null,null,null,null,null,null]; // null|'高め'|'安め'|円数
G={phase:'play',gamePrices,cardState,cardHint,
upper:[],lower:[],pending:[],spT:.3,handX:130,
recommends:null,combo:0,comboDisp:'',comboDispT:0,
full:0,sat:0,totalCost:0,irritate:0,
lastEat:0,time:0,decaying:false,
penaltyTriggered:false,
irritateSaid:[false,false,false],
billSaid:false,
gariUsed:false,gariNextReveal:false,
bub:'',bubT:0,eaten:[],eatenNeta:[],plateCnt:[0,0,0,0,0,0],
teaT:0,gari:3,
flash:0,flashCol:'',cardFlash:[0,0,0,0,0,0],
pops:[],beltSpd:22,lastBgmUp:0,
paused:false,pauseSel:0,
bPhase:0,bStep:0,bWait:0,bTotal:0,bScore:0,
bPriceMult:1,bFullMult:1,
billListDone:false,billKeyReady:false,
rPhase:0,rWait:0,anyKey:false};
G.recommends=genInitialRecommends();
for(let i=0;i<10;i++)G.lower.push({x:10+i*20,data:rNLane()});
for(let i=0;i<8;i++)G.upper.push({x:8+i*25,data:rNLane()});
const bF=document.getElementById('bF'),bS=document.getElementById('bS'),bT=document.getElementById('bT');
bF.style.transition='none';bS.style.transition='none';bT.style.transition='none';
bF.style.width='0%';bS.style.width='0%';bT.style.width='0%';
document.getElementById('ui').style.display='block';
requestAnimationFrame(()=>{bF.style.transition='';bS.style.transition='';bT.style.transition='';});
startBGM('play')}

// ===== INPUT =====
const K={};
window.addEventListener('keydown',e=>{
const k=e.key.toLowerCase();tryInitAudio();
if(G.phase==='title'){newGame();return}
// ポーズ中
if(G.paused){
if(k==='a'||k==='arrowleft'||k==='d'||k==='arrowright')G.pauseSel=1-G.pauseSel;
if(k===' '){if(G.pauseSel===0){G.paused=false}else{newGame()}}
if(k==='escape')G.paused=false;
return}
if(G.phase==='result'&&G.anyKey){stopBGM();G.phase='title';document.getElementById('ui').style.display='none';startBGM('title');return}
if(G.phase==='billing'&&G.billKeyReady){
G.phase='result';G.rPhase=0;G.rWait=.8;G.anyKey=false;G.billKeyReady=false;
const pm=G.bTotal>0?3000/G.bTotal:1;const pl=G.eaten.length;
// 満腹度補正：10-15皿×1.0、それ以外1皿ごと±10%、最低×0.1
let fm=1;
if(pl<10)fm=Math.max(0.1,1-(10-pl)*0.1);
else if(pl<=15)fm=1;
else fm=Math.max(0.1,1-(pl-15)*0.1);
G.bPriceMult=pm;G.bFullMult=fm;
G.bScore=G.bTotal>10000?0:Math.round(G.sat*pm*fm);return}
K[k]=true;if(k===' ')e.preventDefault();
if(k==='escape'&&G.phase==='play'){G.paused=true;G.pauseSel=0;return}
if(G.phase==='play'){
if(G.teaT>0)return;
if(k==='q')startBill();
else if(k==='z')startTea();
else if(k==='e')eatGari();
else if(k===' ')grab()}});
window.addEventListener('keyup',e=>{K[e.key.toLowerCase()]=false});

// ===== ACTIONS =====
function startTea(){G.phase='tea';G.teaT=3;sfxGulp();bub('ゴクゴクゴク……',3)}
function startBill(){
if(G.eaten.length===0){bub('まだ何も食べてないぞ！',2);return}
G.phase='billing';G.bPhase=0;G.bStep=0;G.bWait=0.8;G.billListDone=false;G.billKeyReady=false;
G.bTotal=G.totalCost;sfxJingle();startBGM('bill');
document.getElementById('ui').style.display='none';}
function bub(t,d){G.bub=t;G.bubT=d||3}
function addLog(){} // ログパネル廃止
function addPop(txt,col,sz){G.pops.push({txt,y:0,life:2,col:col||'#ffd740',sz:sz||20})}

function eatGari(){
if(G.gari<=0){sfxBuzz();bub('もうガリはない！',2);return}
G.gari--;sfxGari();
G.flash=0.4;G.flashCol='rgba(200,255,200,';
G.gariNextReveal=true;
// おすすめを即座に切り替え（直前と同じネタは除外）
const prevRecG=G.recommends.slice();G.recommends=[];
const newRec=pickOneRecommend(prevRecG);
if(newRec)G.recommends.push(newRec);
bub('口の中がさっぱりした！！',3);}

function grab(){
let best=null,bd=20;
for(const s of G.lower){const d=Math.abs(s.x-G.handX);if(d<bd){bd=d;best=s}}
if(!best)return;G.lower=G.lower.filter(s=>s!==best);eat(best.data)}

function eat(neta){
const ri=neta.rk,price=G.gamePrices[ri],base=PLATES[ri].base;
G.eaten.push({neta,ri,price});G.eatenNeta.push(neta.nm);G.plateCnt[ri]++;G.totalCost+=price;
G.irritate=Math.max(0,G.irritate-20);
G.cardFlash[ri]=0.4; // 皿カードフラッシュ
// ガリ効果：次に食べた皿の値段を確定
if(G.gariNextReveal){
G.gariNextReveal=false;
if(G.cardState[ri]<2){G.cardState[ri]=2;G.cardHint[ri]=price;bub('間違いない、これは'+price+'円だ！',3);}
else{bub('間違いない、これは'+price+'円だ！',3);}}
// おすすめ判定
const recIdx=G.recommends.findIndex(r=>r.nm===neta.nm);
const isRec=recIdx>=0;
let mult=1.0;
if(isRec){
G.combo++;
mult=Math.min(2.5,1.0+G.combo*0.5); // 1連×1.5, 2連×2.0, 3連×2.5
bub('美味い！！',2);sfxEatGreat();
G.flash=0.5;G.flashCol='rgba(255,215,0,';
G.comboDisp=G.combo>=2?'combo x'+G.combo+'!!':'';
G.comboDispT=G.combo>=2?2:0;
// 3連でコンボリセット
if(G.combo>=3){G.combo=0;G.comboDisp=''}
// おすすめ補充（即座）
G.recommends.splice(recIdx,1);
const newR=pickOneRecommend(G.recommends);
if(newR)G.recommends.push(newR);
}else{
G.combo=0;G.comboDisp='';
sfxEatMid();
}
const earned=Math.round(base*mult);
// 食べた時の独り言（値段ヒント、おすすめ時はスキップ）
if(!isRec){
const r2=Math.random();
if(r2<0.1&&G.cardState[ri]<2){
G.cardState[ri]=2;G.cardHint[ri]=price;
bub('これは'+price+'円だ！',3);
}else if(r2<0.3&&G.cardState[ri]===0){
const avg=PRICE_CENTERS[ri];
const hint=price>=avg?'高め':'安め';
G.cardState[ri]=1;G.cardHint[ri]=hint;
bub(price>=avg?'高めだな……':'安めだな',2);
}
}else if(G.combo>=2){
// コンボ継続中

// ===== UPDATE =====
function update(dt){
if(G.paused)return;
// dying phase removed
if(G.phase==='play'||G.phase==='tea'){
G.time+=dt;if(G.bubT>0)G.bubT-=dt;
if(G.flash>0)G.flash-=dt;
for(let i=0;i<6;i++)if(G.cardFlash[i]>0)G.cardFlash[i]=Math.max(0,G.cardFlash[i]-dt*1.5);
for(const p of G.pops){p.y+=35*dt;p.life-=dt}
G.pops=G.pops.filter(p=>p.life>0);
G.beltSpd=22+G.full*0.5;
if(G.time-G.lastBgmUp>5){G.lastBgmUp=G.time;const r=1+G.full*0.008;if(r-bgmRate>.01)updateBGMRate(r)}
G.spT-=dt;
if(G.spT<=0){G.spT=rr(.35,.9);G.upper.push({x:212,data:rNLane()})}
for(const s of G.upper)s.x-=G.beltSpd*dt;
G.upper=G.upper.filter(s=>{if(s.x<-12){G.pending.push({data:s.data,delay:rr(.15,.4)});return false}return true});
for(const p of G.pending)p.delay-=dt;
for(const p of G.pending.filter(p=>p.delay<=0))G.lower.push({x:-12,data:p.data});
G.pending=G.pending.filter(p=>p.delay>0);
for(const s of G.lower)s.x+=G.beltSpd*dt;
G.lower=G.lower.filter(s=>s.x<215)}
if(G.phase==='play'){
const spd=115*dt;
if(K['a']||K['arrowleft'])G.handX=Math.max(10,G.handX-spd);
if(K['d']||K['arrowright'])G.handX=Math.min(190,G.handX+spd);
// イライラ：毎秒2%上昇
G.irritate=Math.min(100,G.irritate+6*dt);
if(G.irritate>=20&&!G.irritateSaid[0]){G.irritateSaid[0]=true;bub('なかなか食べられないな……',2.5)}
if(G.irritate>=40&&!G.irritateSaid[1]){G.irritateSaid[1]=true;bub('イライラしてきた',2.5)}
if(G.irritate>=60&&!G.irritateSaid[2]){G.irritateSaid[2]=true;bub('イライライライラ……！！',2.5)}
G.decaying=false;
if(G.irritate>60){if(!G.penaltyTriggered){G.penaltyTriggered=true;sfxBuzz()}G.sat=Math.max(0,G.sat-7*dt);G.decaying=true}
else if(G.irritate>40){if(!G.penaltyTriggered){G.penaltyTriggered=true;sfxBuzz()}G.sat=Math.max(0,G.sat-4*dt);G.decaying=true}
else{G.penaltyTriggered=false;}
// コンボ表示タイマー
if(G.comboDispT>0)G.comboDispT-=dt;
}
if(G.phase==='tea'){G.teaT-=dt;
if(G.teaT<=0){G.irritate=0;G.phase='play';bub('プハー！',1.5);G.irritateSaid=[false,false,false]}}
if(G.phase==='billing'){G.bWait-=dt;
if(G.bPhase===0&&G.bWait<=0){G.bPhase=1;G.bStep=0;G.bWait=.2}
if(G.bPhase===1){if(G.bWait<=0&&!G.billListDone){if(G.bStep<G.eaten.length){G.bStep++;sfxCoin();G.bWait=.15}else{G.billListDone=true;sfxRegister();G.bWait=0.8}}
if(G.billListDone&&G.bWait<=0&&!G.billKeyReady)G.billKeyReady=true}}
if(G.phase==='result'){G.rWait-=dt;if(G.rWait<=0&&G.rPhase<6){G.rPhase++;if(G.rPhase===6)sfxScoreFanfare();else sfxBan();G.rWait=G.rPhase<6?.4:1.2}
if(G.rPhase>=6&&G.rWait<=0&&!G.anyKey)G.anyKey=true}}

OC.font='bold 14px sans-serif';OC.fillStyle='#fff';OC.fillText(PNAMES[pi]+' : '+G.gamePrices[pi]+'円',ppx+18,ppy+6);
OC.font='12px monospace';const g=groups[pi];
if(!g.length){OC.fillStyle='#999';OC.fillText('（なし）',ppx+10,ppy+22)}
else{const cnt={};for(const e of g)cnt[e.neta.nm]=(cnt[e.neta.nm]||0)+1;let yi=0;for(const nm of Object.keys(cnt)){OC.fillStyle='#ddd';OC.fillText(nm+(cnt[nm]>1?' ×'+cnt[nm]:''),ppx+10,ppy+22+yi*14);yi++}}}
if(G.billListDone){OC.textAlign='center';OC.font='bold 28px sans-serif';OC.fillStyle='#fff';OC.fillText('合計: '+G.bTotal+'円',400,480)}
if(G.billKeyReady){OC.textAlign='center';OC.font='bold 15px sans-serif';OC.fillStyle='#ffd740';if(Math.sin(performance.now()/400)>.2)OC.fillText('▶ 何かキーを押したら、最終結果が出ます',400,530)}}

// ===== RESULT =====
function renderResult(){
DC.fillStyle='#100a04';DC.fillRect(0,0,800,600);OC.fillStyle='rgba(10,5,2,.95)';OC.fillRect(0,0,800,600);
OC.textAlign='center';const o10k=G.bTotal>10000;
OC.font='bold 24px sans-serif';OC.fillStyle='#ffd740';OC.fillText('結 果 発 表',400,80);
if(G.rPhase>=1){OC.font='bold 16px sans-serif';OC.fillStyle='#ccc';OC.fillText('食べた皿数: '+G.eaten.length+'皿',400,120)}
if(G.rPhase>=2){OC.font='bold 16px sans-serif';OC.fillStyle='#fff';OC.fillText('合計金額: '+G.bTotal+'円',400,150)}
if(G.rPhase>=3){OC.font='bold 16px sans-serif';OC.fillStyle='#f0ad4e';OC.fillText('素の満足度: '+Math.round(G.sat),400,180)}
if(G.rPhase>=4){
if(o10k){OC.font='bold 15px sans-serif';OC.fillStyle='#f44';OC.fillText('10,000円超過！！',400,215)}
else{OC.font='14px sans-serif';OC.fillStyle='#bbb';OC.fillText('価格補正: 3000÷'+G.bTotal+'=×'+G.bPriceMult.toFixed(2)+(G.bPriceMult>1?' (お得！)':G.bPriceMult<1?' (高い…)':''),400,215)}}
if(G.rPhase>=5&&!o10k){const pl=G.eaten.length;let fl='',fc='#999';
if(pl<10){fl='物足りない…（×'+G.bFullMult.toFixed(2)+'）';fc='#e8830c'}
else if(pl<=15){fl='満腹！（補正なし）';fc='#8bc34a'}
else{fl='食べすぎた…！（×'+G.bFullMult.toFixed(1)+'）';fc='#e8830c'}
OC.font='14px sans-serif';OC.fillStyle=fc;OC.fillText('満腹度補正: '+pl+'皿 → '+fl,400,245)}
if(G.rPhase>=6){const sc=G.bScore;OC.font='bold 68px sans-serif';OC.fillStyle=sc===0?'#f44':'#ffd740';OC.fillText(sc,400,340);
let rt='',rc='#ff9800';
if(o10k){rt='無銭飲食：お会計が高すぎる……！ 払えないぞ！！';rc='#f44'}
else if(sc>=1800){rt='神：究極の寿司体験！！';rc='#ffd740'}
else if(sc>=1100){rt='特上：最高の寿司だったな！';rc='#ff9800'}
else if(sc>=600){rt='上：申し分のない寿司だった！';rc='#8bc34a'}
else if(sc>=420){rt='並：まあ……こんなもんかなあ';rc='#ccc'}
else{rt='下：あんまり良くなかった……';rc='#999'}
OC.font='bold 15px sans-serif';OC.fillStyle=rc;const ci=rt.indexOf('：');
if(rt.length>25){OC.fillText(rt.slice(0,ci+1),400,385);OC.font='13px sans-serif';OC.fillText(rt.slice(ci+1),400,405)}else OC.fillText(rt,400,390)}
if(G.anyKey){const hi=HINTS[(G.bTotal+G.eaten.length)%HINTS.length];OC.font='14px sans-serif';OC.fillStyle='#aaa';
if(hi.length>38){OC.fillText(hi.slice(0,38),400,460);OC.fillText(hi.slice(38),400,478)}else OC.fillText(hi,400,465);
OC.font='bold 15px sans-serif';OC.fillStyle='#ffd740';if(Math.sin(performance.now()/400)>.2)OC.fillText('なんか押したらもう一回遊べます',400,540)}}

function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
let lt=0;function loop(t){const dt=Math.min((t-lt)/1000,.05);lt=t;update(dt);render();requestAnimationFrame(loop)}
requestAnimationFrame(t=>{lt=t;loop(t)});
</script>
