<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a12;

canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }

.bar-label { color: #bbb; font-size: 12px; width: 58px; text-align: right; margin-right: 6px; font-weight: bold; }
.bar-outer { flex: 1; height: 14px; background: #222; border-radius: 3px; overflow: hidden; border: 1px solid #333; }
.bar-inner { height: 100%; border-radius: 2px; transition: width .15s linear, background .2s; }
#debug-panel {
  position: fixed; top: 8px; right: 8px;
  background: rgba(20,20,30,0.92); color: #ddd;
  font: 12px 'Helvetica', sans-serif;
  padding: 10px 12px;
  border: 1px solid #444; border-radius: 4px;
  z-index: 9999;
  max-width: 240px;
  display: none;
}
#debug-panel.show { display: block; }
#debug-panel .dh { font-weight: bold; color: #ffd740; margin-bottom: 6px; font-size: 11px; letter-spacing: 1px; }
#debug-panel button { background: #2a2a3a; color: #ddd; border: 1px solid #555; padding: 2px 6px; font-size: 11px; cursor: pointer; margin: 1px; border-radius: 2px; }
#debug-panel button:hover { background: #3a3a4a; }
#debug-panel select { background: #1a1a2a; color: #ddd; border: 1px solid #555; font-size: 11px; padding: 1px; max-width: 200px; }
#debug-panel input[type="range"] { width: 130px; vertical-align: middle; }
#debug-panel label { font-size: 11px; }
#debug-panel > div { margin: 6px 0; padding-bottom: 4px; border-bottom: 1px solid #2a2a2a; }
#debug-panel > div:last-child { border-bottom: none; }
</style>
</head>
