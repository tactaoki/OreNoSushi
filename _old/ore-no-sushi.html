// ===== キャンバス =====
const gameCanvas    = document.getElementById('c');
const gameCtx       = gameCanvas.getContext('2d');
const overlayCanvas = document.getElementById('ov');

// ドット絵用オフスクリーンキャンバス（200×110px → PX倍に拡大して描画）
const pixelCanvas = document.createElement('canvas');
pixelCanvas.width  = 200;
pixelCanvas.height = 110;
const pixelCtx = pixelCanvas.getContext('2d');

const PX             = 4;    // ドット絵拡大倍率
const PIXEL_OFFSET_Y = 120;  // ドット絵をゲームキャンバスに描く際のY座標オフセット
const UPPER_BELT_Y   = 8;

// ===== 音声 =====
let audioCtx;

function resumeAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function tone(freq, duration, type, volume, delay) {
  if (!audioCtx) return;
  const startTime = audioCtx.currentTime + (delay || 0);
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume || 0.04, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playNoise(duration, volume, delay) {
  if (!audioCtx) return;
  const startTime = audioCtx.currentTime + (delay || 0);
  const src = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume || 0.02, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(startTime);
  src.stop(startTime + duration);
}

  }
};

function startBGM(name, rate) {
  if (currentBgm === name) return;
  stopBGM();
  currentBgm = name;
  if (!audioCtx) return;
  const track = BGM_TRACKS[name];
  if (!track) return;
  bgmStep = 0;
  bgmRate = rate || 1;
  const interval = 60000 / track.bpm / 2 / bgmRate;
  bgmTimer = setInterval(() => {
    const m = track.mel[bgmStep % track.mel.length];
    if (m) tone(m, interval / 1000 * 0.7, 'triangle', 0.02);
    const b = track.bas[bgmStep % track.bas.length];
    if (b) tone(b, interval / 1000 * 1.2, 'sine', 0.014);
    bgmStep++;
  }, interval);
}

function stopBGM() {
  if (bgmTimer) clearInterval(bgmTimer);
  bgmTimer   = null;
  currentBgm = '';
}

function updateBGMRate(rate) {
  if (!audioCtx || currentBgm !== 'play') return;
  stopBGM();
  startBGM('play', rate);
}

let audioInitialized = false;
function tryInitAudio() {
  if (audioInitialized) return;
  audioInitialized = true;
  resumeAudio();
  startBGM('title');
}
document.addEventListener('click', () => {

const NETA_BY_RANK = [[], [], [], [], [], []];
NETA_LIST.forEach(n => NETA_BY_RANK[n.rk].push(n));

// 正規分布で中央寄りのランダム値（min〜max の範囲）
function normRand(min, max) {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  const z = Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  const t = Math.max(-2.5, Math.min(2.5, z));
  return min + (max - min) * ((t + 2.5) / 5);
}

// 時価をゲーム開始時に決定
function rollPrices() {
  const prices = [];
  for (let rank = 0; rank < 6; rank++) {
    const raw = normRand(PRICE_CENTERS[rank] - PRICE_SPREADS[rank], PRICE_CENTERS[rank] + PRICE_SPREADS[rank]);
    prices[rank] = Math.round(raw / 10) * 10;
  }
  return prices;
}

function rand(min, max) { return min + Math.random() * (max - min); }

// ===== レーン生成 =====
let laneHistory = [];

// 安いほど多く、後半は高いネタ増加、直前2つと被らない
function randomLaneSushi() {
  const progress = (game.full || 0) / 20;
  const weights = NETA_LIST.map(n => {
    const base = 3 - n.rk * 0.5;
    const late = progress * n.rk * 0.8;
    return Math.max(0.05, base + late);
  });
  for (let attempt = 0; attempt < 30; attempt++) {
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    let pick = NETA_LIST[0];
    for (let j = 0; j < NETA_LIST.length; j++) {
      r -= weights[j];
      if (r <= 0) { pick = NETA_LIST[j]; break; }
    }
    if (!laneHistory.includes(pick.nm)) {
      laneHistory.push(pick.nm);
      if (laneHistory.length > 2) laneHistory.shift();
      return pick;
    }
  }
  return NETA_LIST[Math.floor(Math.random() * NETA_LIST.length)];
}

// 食べた枚数に応じたおすすめ候補の最大ランク
function maxRecommendRank(platesEaten) {
  if (platesEaten <= 0) return 0;
  if (platesEaten <= 3) return 1;
  if (platesEaten <= 6) return 2;
  if (platesEaten <= 9) return 3;
  return 5;
}

// おすすめを1件選ぶ（食べ済み・既表示と被らない）
function pickOneRecommend(existing) {
  const rank    = maxRecommendRank(game.full || 0);
  const exclude = existing.map(e => e.nm).concat(game.eatenNeta || []);
  const pool    = NETA_BY_RANK[rank].filter(n => !exclude.includes(n.nm));
  if (pool.length) return pool[Math.floor(Math.random() * pool.length)];
  // 当該ランクが枯渇したら全ランクから
  const fallback = NETA_LIST.filter(n => !exclude.includes(n.nm));
  return fallback.length ? fallback[Math.floor(Math.random() * fallback.length)] : null;
}

// ゲーム開始時のおすすめ（ランク0から1件）
function genInitialRecommends() {
  const pool = NETA_BY_RANK[0].slice();
  if (!pool.length) return [];
  return [pool[Math.floor(Math.random() * pool.length)]];
}

function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // BOM除去
  const rows = [];
  let pos = 0;
  while (pos < text.length) {
    const row = [];
    while (pos <= text.length) {
      let field = '';
      if (pos < text.length && text[pos] === '"') {
        pos++;
        while (pos < text.length) {
          if (text[pos] === '"' && text[pos + 1] === '"') { field += '"'; pos += 2; }
          else if (text[pos] === '"') { pos++; break; }
          else field += text[pos++];
        }
      } else {
        while (pos < text.length && text[pos] !== ',' && text[pos] !== '\r' && text[pos] !== '\n')
          field += text[pos++];
      }
      row.push(field);
      if (pos >= text.length) break;
      if (text[pos] === ',') { pos++; continue; }
      if (text[pos] === '\r' && text[pos + 1] === '\n') { pos += 2; break; }
      if (text[pos] === '\n') { pos++; break; }
    }
    if (row.some(f => f.trim())) rows.push(row);
  }
  return rows;
}

function parseAndStoreScenario(text) {
  const rows = parseCSV(text);
  let interCount = 0;
  for (let i = 1; i < rows.length; i++) {
    const stage      = (rows[i][0] || '').trim();
    const scene      = (rows[i][1] || '').trim();
    const type       = (rows[i][2] || '').trim();
    const speaker    = (rows[i][3] || '').trim();
    const expression = (rows[i][4] || '').trim();
    const content    = (rows[i][5] || '').trim();
    if (!stage && !type) continue;
    if (stage === 'ステージ') continue;
    let key;
    if      (stage === 'Inter')   key = `Inter_${interCount++}`;
    else if (stage === 'PROLOGUE') key = 'PROLOGUE';
    else if (stage === 'Ending')   key = 'Ending';
    else                           key = `${stage}_${scene}`;
    if (!scenario.scenes.has(key)) scenario.scenes.set(key, []);
    scenario.scenes.get(key).push({ type, speaker, expression, content });
  }
  scenario.loaded = true;
}

// ===== 入力 =====
const keys = {};

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();

  // プロローグ画面：何か押したらオーディオ初期化してプロローグVNへ
  if (game.phase === 'prologue') {
    resumeAudio();
    audioInitialized = true;
    prologueSeen = true;
    saveProgress();
    startBGM('title');
    game.phase = 'title';
    return;
  }

  if (game.phase !== 'prologue') tryInitAudio();

  // VN中のスペース処理
  if (game.phase === 'vn' && k === ' ') {
    e.preventDefault();
    const fadeDone = Math.abs(vn.fadeAlpha - vn.fadeTarget) < 0.01;
    if (!fadeDone) {
      // フェードをスキップして即完了
      vn.fadeAlpha = vn.fadeTarget;
      if (vn.fadeCb) { const cb = vn.fadeCb; vn.fadeCb = null; cb(); }
    } else if (vn.waitInput) {
      vn.waitInput = false;
      vn.dialog = null;
      processVNEvent();
    }
    return;
  }

  if (game.phase === 'title') {
    if (k === 'r') {
      localStorage.removeItem('orenosushi_unlocked');
      localStorage.removeItem('orenosushi_prologue');
      unlockedStages  = 1;
      prologueSeen    = false;
      titleFlashTimer = 0.5;
      stopBGM();
      return;
    }
    stopBGM();
    game.phase = 'stageselect';
    stageSelectCursor = 0;
    return;
  }

  if (game.phase === 'stageselect') {
    if (k === 'a' || k === 'arrowleft')  stageSelectCursor = Math.max(0, stageSelectCursor - 1);
    if (k === 'd' || k === 'arrowright') stageSelectCursor = Math.min(4, stageSelectCursor + 1);
    if (k === ' ') {
      const sel = stageSelectCursor + 1;
      if (sel <= unlockedStages) {
        currentStage = sel;
        stopBGM();
        playVNScene(`Stage${currentStage}_OPEN`, () => newGame());
      }
    }
    return;
  }

  if (game.phase === 'choice') {
    if (k === 'a' || k === 'arrowleft' || k === 'd' || k === 'arrowright') game.choiceSel = 1 - game.choiceSel;
    if (k === ' ') {
      if (game.choiceSel === 0) {
        newGame();
      } else {
        game.phase = 'title';
      }
    }
    return;
  }

  if (game.phase === 'ending' && game.endingReady) {
    game.phase = 'title';
    stopBGM();
    return;
  }

  if (game.paused) {
    if (k === 'a' || k === 'arrowleft' || k === 'd' || k === 'arrowright') game.pauseSel = 1 - game.pauseSel;
    if (k === ' ') { if (game.pauseSel === 0) game.paused = false; else newGame(); }
    if (k === 'escape') game.paused = false;
    return;
  }

  if (game.phase === 'result' && game.anyKey) {
    stopBGM();
    document.getElementById('ui').style.display = 'none';
  document.getElementById('keys').style.display = 'none';
    const stage = currentStage;
    if (game.score >= 420) {
      if (stage >= unlockedStages) {
        unlockedStages = stage + 1;
        saveProgress();
      }
      playVNScene(`Stage${stage}_CLEAR`, () => {
        const afterInter = () => {
          if (stage === 5) {
            playVNScene('Ending', () => { game.phase = 'ending'; game.endingWait = 3; game.endingReady = false; });
          } else {
            game.phase = 'stageselect';
          }
        };
        const interKey = INTER_MAP[stage];
        if (interKey) playVNScene(interKey, afterInter);
        else afterInter();
      });
    } else {
      playVNScene(`Stage${stage}_RETRY`, () => { game.phase = 'choice'; game.choiceSel = 0; });
    }
    return;
  }

  if (game.phase === 'billing' && game.billKeyReady) {
    game.phase = 'result';
    game.resultPhase = 0;
    game.resultWait  = 0.8;
    game.anyKey      = false;
    game.billKeyReady = false;
    const priceMult   = game.billTotal > 0 ? 3000 / game.billTotal : 1;
    const plateCount  = game.eaten.length;
    // 10〜15皿で補正なし、それ以外は1皿ごとに±10%（最低×0.1）
    let fullnessMult = 1;
    if      (plateCount < 10)  fullnessMult = Math.max(0.1, 1 - (10 - plateCount) * 0.1);
    else if (plateCount <= 15) fullnessMult = 1;
    else                       fullnessMult = Math.max(0.1, 1 - (plateCount - 15) * 0.1);
    game.priceMult    = priceMult;
    game.fullnessMult = fullnessMult;
    game.score        = game.billTotal > 10000 ? 0 : Math.round(game.sat * priceMult * fullnessMult);
    return;
  }

  keys[k] = true;
  if (k === ' ') e.preventDefault();

  if (k === 'escape' && game.phase === 'play') { game.paused = true; game.pauseSel = 0; return; }

  if (game.phase === 'play') {
    if (game.teaTimer > 0) return;
    if      (k === 'q') startBill();
    else if (k === 'z') startTea();
    else if (k === 'e') eatGari();
    else if (k === ' ') grab();
  }
});

function grab() {
  let best = null, bestDist = 20;
  for (const sushi of game.lower) {
    const dist = Math.abs(sushi.x - game.handX);
    if (dist < bestDist) { bestDist = dist; best = sushi; }
  }
  if (!best) return;
  game.lower = game.lower.filter(s => s !== best);
  eat(best.data);
}

function eat(neta) {
  const rank  = neta.rk;
  const price = game.gamePrices[rank];
  const base  = PLATES[rank].base;

  game.eaten.push({ neta, ri: rank, price });
  game.eatenNeta.push(neta.nm);
  game.plateCnt[rank]++;
  game.totalCost += price;
  game.irritate   = Math.max(0, game.irritate - 20);
  game.cardFlash[rank] = 0.4;

  // ガリ効果：次に食べた皿の値段を確定表示
  if (game.gariNextReveal) {
    game.gariNextReveal = false;
    if (game.cardState[rank] < 2) { game.cardState[rank] = 2; game.cardHint[rank] = price; }
    showBubble('間違いない、これは' + price + '円だ！', 3);
  }

  // おすすめ判定
  const recIdx = game.recommends.findIndex(r => r.nm === neta.nm);
  const isRec  = recIdx >= 0;
  let mult = 1.0;

  if (isRec) {
    game.combo++;
    mult = Math.min(2.5, 1.0 + game.combo * 0.5); // 1連×1.5, 2連×2.0, 3連×2.5
    showBubble('美味い！！', 2);
    sfxEatGreat();
    game.flash    = 0.5;
    game.flashCol = 'rgba(255,215,0,';
    game.comboLabel      = game.combo >= 2 ? 'combo x' + game.combo + '!!' : '';
    game.comboLabelTimer = game.combo >= 2 ? 2 : 0;
    if (game.combo >= 3) { game.combo = 0; game.comboLabel = ''; } // 3連でリセット
    game.recommends.splice(recIdx, 1);
    const newRec = pickOneRecommend(game.recommends);
    if (newRec) game.recommends.push(newRec);
  } else {
    game.combo      = 0;
    game.comboLabel = '';
    sfxEatMid();
    const recRank = game.recommends.length > 0 ? game.recommends[0].rk : -1;
    if (rank === recRank) { mult = 0.8; showBubble('まあ、値段は一緒だし……', 2); }
    else                  { mult = 0.5; showBubble('とりあえずこれでも食っておくか', 2); }
  }

  const earned = Math.round(base * mult);

  // 食べたときの独り言（値段ヒント、おすすめ時はスキップ）
  if (!isRec) {
    const r = Math.random();
    if (r < 0.1 && game.cardState[rank] < 2) {
      game.cardState[rank] = 2; game.cardHint[rank] = price;
      showBubble('これは' + price + '円だ！', 3);
    } else if (r < 0.3 && game.cardState[rank] === 0) {
      const hint = price >= PRICE_CENTERS[rank] ? '高め' : '安め';
      game.cardState[rank] = 1; game.cardHint[rank] = hint;
      showBubble(price >= PRICE_CENTERS[rank] ? '高めだな……' : '安めだな', 2);
    }
  } else if (game.combo >= 2) {
    setTimeout(() => { if (game.bubbleTimer <= 0) showBubble('寿司最高！', 1.5); }, 500);
  }

  game.sat    += earned;
  game.full++;
  game.lastEat = game.time;

  if (game.totalCost > 4000 && !game.billSaid) { game.billSaid = true; showBubble('……会計が気になるな', 2.5); }

  let popColor = '#aaa', popSize = 18;
  if      (earned >= 200) { popColor = '#ffd740'; popSize = 38; }
  else if (earned >= 100) { popColor = '#ff9800'; popSize = 32; }
  else if (earned >= 60)  { popColor = '#4caf50'; popSize = 26; }
  else if (earned >= 30)  { popColor = '#fff';    popSize = 22; }
  addPopup('+' + earned, popColor, popSize);
  sfxChew();

  // おすすめ外を食べてもおすすめを即切り替え
  if (!isRec) {
    const prevRec = game.recommends.slice();
    game.recommends = [];
    const newRec = pickOneRecommend(prevRec);
    if (newRec) game.recommends.push(newRec);
  }

  if (game.full === 16) showBubble('そろそろ腹がきつい……', 2);
  if (game.full >= 20)  setTimeout(startBill, 600);
}

// ===== VNエンジン =====
const vn = {
  events: [], index: 0,
  bg: null, leftChar: null, rightChar: null, dialog: null,
  fadeAlpha: 1, fadeTarget: 1, fadeCb: null,
  waitInput: false, onComplete: null,
};

function playVNScene(key, onComplete) {
  const events = scenario.scenes.get(key);
  if (!events || !events.length) { onComplete && onComplete(); return; }
  game.phase = 'vn';
  document.getElementById('ui').style.display = 'none';
  document.getElementById('keys').style.display = 'none';
  Object.assign(vn, {
    events, index: 0,
    bg: null, leftChar: null, rightChar: null, dialog: null,
    fadeAlpha: 1, fadeTarget: 1, fadeCb: null,
    waitInput: false, onComplete,
  });
  processVNEvent();
}

function processVNEvent() {
  while (vn.index < vn.events.length) {
    const { type, speaker, expression, content } = vn.events[vn.index++];
    if (type === 'フェード') {
      startVNFade(speaker === '暗転' ? 1 : 0, processVNEvent); return;
    }
    if (type === '背景')     { vn.bg = content; continue; }
    if (type === 'キャラ') {
      const isLeft = speaker === '主人公';
      const val = content === '退場' ? null : { expression };
      if (isLeft) vn.leftChar = val; else vn.rightChar = val;
      continue;
    }
    if (type === 'ナレーション') { vn.dialog = { speaker: '',      text: content }; vn.waitInput = true; return; }
    if (type === 'セリフ')       { vn.dialog = { speaker,           text: content }; vn.waitInput = true; return; }
  }
  // シーン終了
  if (vn.onComplete) { const cb = vn.onComplete; vn.onComplete = null; cb(); }
}

function startVNFade(target, cb) {
  if (Math.abs(vn.fadeAlpha - target) < 0.01) { cb(); return; }
  vn.fadeTarget = target; vn.fadeCb = cb;
}

function updateVN(dt) {
  if (Math.abs(vn.fadeAlpha - vn.fadeTarget) > 0.001) {
    const dir = vn.fadeTarget > vn.fadeAlpha ? 1 : -1;
    vn.fadeAlpha = Math.max(0, Math.min(1, vn.fadeAlpha + dir * 1.8 * dt));
    if ((dir > 0 && vn.fadeAlpha >= vn.fadeTarget) || (dir < 0 && vn.fadeAlpha <= vn.fadeTarget)) {
      vn.fadeAlpha = vn.fadeTarget;
      if (vn.fadeCb) { const cb = vn.fadeCb; vn.fadeCb = null; cb(); }
    }
  }
}

// ===== 更新 =====
function update(dt) {
  if (game.paused) return;

  if (titleFlashTimer > 0) titleFlashTimer = Math.max(0, titleFlashTimer - dt);

  if (game.phase === 'vn') { updateVN(dt); return; }

  if (game.phase === 'ending') {
    if (game.endingWait > 0) { game.endingWait -= dt; if (game.endingWait <= 0) game.endingReady = true; }
    return;
  }

  if (game.phase === 'play' || game.phase === 'tea') {
    game.time        += dt;
    game.bubbleTimer -= dt;
    game.flash       -= dt;
    for (let i = 0; i < 6; i++) {
      if (game.cardFlash[i] > 0) game.cardFlash[i] = Math.max(0, game.cardFlash[i] - dt * 1.5);
    }
    for (const p of game.popups) { p.y += 35 * dt; p.life -= dt; }
    game.popups = game.popups.filter(p => p.life > 0);

    game.beltSpeed = 22 + game.full * 0.5;

    // 食べた枚数に応じてBGMテンポを徐々に上げる（5秒ごとにチェック）
    if (game.time - game.lastBgmTick > 5) {
      game.lastBgmTick = game.time;
      const rate = 1 + game.full * 0.008;
      if (rate - bgmRate > 0.01) updateBGMRate(rate);
    }

    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      game.spawnTimer = rand(0.35, 0.9);
      game.upper.push({ x: 212, data: randomLaneSushi() });
    }

    for (const s of game.upper) s.x -= game.beltSpeed * dt;
    game.upper = game.upper.filter(s => {
      if (s.x < -12) { game.pending.push({ data: s.data, delay: rand(0.15, 0.4) }); return false; }
      return true;
    });
    for (const p of game.pending) p.delay -= dt;
    for (const p of game.pending.filter(p => p.delay <= 0)) game.lower.push({ x: -12, data: p.data });
    game.pending = game.pending.filter(p => p.delay > 0);
    for (const s of game.lower) s.x += game.beltSpeed * dt;
    game.lower = game.lower.filter(s => s.x < 215);
  }

  if (game.phase === 'play') {
    const moveSpeed = 115 * dt;
    if (keys['a'] || keys['arrowleft'])  game.handX = Math.max(10,  game.handX - moveSpeed);
    if (keys['d'] || keys['arrowright']) game.handX = Math.min(190, game.handX + moveSpeed);

    // イライラ：約6%/秒で上昇
    game.irritate = Math.min(100, game.irritate + 6 * dt);
    if (game.irritate >= 20 && !game.irritateSaid[0]) { game.irritateSaid[0] = true; showBubble('なかなか食べられないな……', 2.5); }
    if (game.irritate >= 40 && !game.irritateSaid[1]) { game.irritateSaid[1] = true; showBubble('イライラしてきた', 2.5); }
    if (game.irritate >= 60 && !game.irritateSaid[2]) { game.irritateSaid[2] = true; showBubble('イライライライラ……！！', 2.5); }

    game.decaying = false;
    if (game.irritate > 60) {
      if (!game.penaltyTriggered) { game.penaltyTriggered = true; sfxBuzz(); }
      game.sat = Math.max(0, game.sat - 7 * dt);
      game.decaying = true;
    } else if (game.irritate > 40) {
      if (!game.penaltyTriggered) { game.penaltyTriggered = true; sfxBuzz(); }
      game.sat = Math.max(0, game.sat - 4 * dt);
      game.decaying = true;
    } else {
      game.penaltyTriggered = false;
    }

    if (game.comboLabelTimer > 0) game.comboLabelTimer -= dt;
  }

  if (game.phase === 'tea') {
    game.teaTimer -= dt;
    if (game.teaTimer <= 0) {
      game.irritate = 0;
      game.phase    = 'play';
      showBubble('プハー！', 1.5);
      game.irritateSaid = [false, false, false];
    }
  }

  if (game.phase === 'billing') {
    game.billWait -= dt;
    if (game.billPhase === 0 && game.billWait <= 0) {
      game.billPhase = 1; game.billStep = 0; game.billWait = 0.2;
    }
    if (game.billPhase === 1) {
      if (game.billWait <= 0 && !game.billListDone) {
        if (game.billStep < game.eaten.length) {
          game.billStep++; sfxCoin(); game.billWait = 0.15;
        } else {
          game.billListDone = true; sfxRegister(); game.billWait = 0.8;
        }
      }
      if (game.billListDone && game.billWait <= 0 && !game.billKeyReady) game.billKeyReady = true;
    }
  }

  if (game.phase === 'result') {
    game.resultWait -= dt;
    if (game.resultWait <= 0 && game.resultPhase < 6) {
      game.resultPhase++;
      if (game.resultPhase === 6) sfxScoreFanfare(); else sfxBan();
      game.resultWait = game.resultPhase < 6 ? 0.4 : 1.2;
    }
    if (game.resultPhase >= 6 && game.resultWait <= 0 && !game.anyKey) game.anyKey = true;
  }
}

// ===== ドット絵ヘルパー =====
function drawPixel(x, y, w, h, color) {
  pixelCtx.fillStyle = color;
  pixelCtx.fillRect(x | 0, y | 0, w, h);
}

function drawPlate(cx, y, rank, small) {
  const w = small ? 6 : 8, hw = w / 2 | 0;
  if (rank === 5) {
    drawPixel(cx - hw, y,     w, 2, '#111');
    drawPixel(cx - hw, y,     w, 1, '#daa520');
    drawPixel(cx - hw, y,     1, 2, '#daa520');
    drawPixel(cx + hw - 1, y, 1, 2, '#daa520');
  } else {
    drawPixel(cx - hw, y, w, 2, PLATE_COLORS[rank]);
  }
}

function drawNeta(cx, y, neta, small) {
  const nw = small ? 4 : 6, nh = small ? 1 : 2, rh = small ? 1 : 2, hnw = nw / 2 | 0;
  drawPlate(cx, y + nh + rh, neta.rk, small);
  if (neta.gn) { // 軍艦巻き
    drawPixel(cx - hnw - 1, y,      nw + 2, nh + rh, '#1a2e1a');
    drawPixel(cx - hnw,     y + nh, nw,     rh,      '#fff');
    drawPixel(cx - hnw,     y,      nw,     nh,      neta.tc);
  } else {
    drawPixel(cx - hnw, y + nh, nw, rh, '#fff');
    drawPixel(cx - hnw, y,      nw, nh, neta.tc);
  }
}

function drawBelt(y, time, dir) {
  pixelCtx.fillStyle = '#484848';
  pixelCtx.fillRect(0, y, 200, 10);
  const offset = ((time * (dir > 0 ? 20 : -20)) | 0) % 6;
  for (let x = (offset % 6 + 6) % 6 - 6; x < 200; x += 6) {
    drawPixel(x, y + 3, 3, 1, '#3e3e3e');
    drawPixel(x, y + 6, 3, 1, '#3e3e3e');
  }
  drawPixel(0, y,     200, 1, '#777');
  drawPixel(0, y + 9, 200, 1, '#777');
}

function drawHead(cx, cy) {
  const skinDark = '#dba87a', skinLight = '#ecc9a0';
  for (let dy = -9; dy <= 4; dy++) {
    const r2 = 110 - (dy * dy) * 1.1;
    if (r2 < 0) continue;
    const w = Math.floor(Math.sqrt(r2));
    drawPixel(cx - w, cy + dy, w * 2, 1, dy < -5 ? skinLight : skinDark);
  }
  drawPixel(cx - 3,  cy - 8, 2, 2, '#f5dfc0');
  drawPixel(cx - 1,  cy - 9, 1, 1, '#faebd7');
  drawPixel(cx - 12, cy - 1, 3, 5, skinDark);
  drawPixel(cx + 9,  cy - 1, 3, 5, skinDark);
}

function drawBody(cx, cy) {
  drawPixel(cx - 9,  cy,     18, 20, '#444');
  drawPixel(cx - 8,  cy + 1, 16, 18, '#3c3c3c');
  drawPixel(cx - 10, cy + 2,  2,  6, '#444');
  drawPixel(cx + 8,  cy + 2,  2,  6, '#444');
  drawPixel(cx - 3,  cy,      6,  2, '#ddd'); // 襟
}

function drawLeftArm(bodyX, bodyY, targetX, targetY) {
  const sleeve = '#444', skin = '#dba87a';
  const sx = bodyX - 10, sy = bodyY + 4;
  for (let i = 0; i < 8; i++) {
    const t = i / 7;
    drawPixel((sx + (targetX - 3 - sx) * t) | 0, (sy + (targetY - 2 - sy) * t) | 0, 3, 3, sleeve);
  }
  drawPixel(targetX - 5, targetY - 4,  3, 6, skin);
  drawPixel(targetX - 6, targetY - 2,  1, 3, '#c49060');
  drawPixel(targetX - 2, targetY - 6,  8, 8, '#e0e0e0');
  drawPixel(targetX - 1, targetY - 7,  6, 1, '#eee');
  drawPixel(targetX - 1, targetY - 5,  6, 5, '#2e7d32');
  drawPixel(targetX + 6, targetY - 4,  2, 3, '#ccc');
}

function drawRightArm(handX, bodyX, bodyY) {
  const sleeve = '#444', skin = '#dba87a', skinDark = '#c49060';
  const sx = bodyX + 9, sy = bodyY + 4, hy = LOWER_BELT_Y + 10;
  for (let i = 0; i < 10; i++) {
    const t = i / 9;
    drawPixel((sx + (handX - sx) * t) | 0, (sy + (hy - sy) * t) | 0, 4, 3, sleeve);
  }
  drawPixel(handX - 4, hy - 3, 9, 6, skin);
  drawPixel(handX - 4, hy - 2, 1, 4, skinDark);
  drawPixel(handX + 4, hy - 2, 1, 4, skinDark);
  drawPixel(handX - 3, hy + 3, 7, 1, skinDark);
}

function drawGari(cx, cy, count) {
  drawPixel(cx - 4, cy, 8, 2, '#e0e0e0');
  for (let i = 0; i < count; i++) {
    drawPixel(cx - 3 + i * 4, cy - 2, 3, 2, '#ffcc80');
    drawPixel(cx - 3 + i * 4, cy - 1, 3, 1, '#ffe0b2');
  }
}

// おすすめパネル用：ネタスプライトを pixelCanvas から overlayCtx へ転写
function drawSushiToOverlay(neta, destX, destY, scale) {
  const wx = 190, wy = 101; // pixelCanvas 上の作業領域（右下隅）
  pixelCtx.clearRect(wx - 6, wy - 1, 16, 10);
  drawNeta(wx, wy, neta, false);
  overlayCtx.imageSmoothingEnabled = false;
  overlayCtx.drawImage(pixelCanvas, wx - 4, wy, 8, 6, destX, destY, 8 * scale, 6 * scale);
}

// 角丸矩形パスを定義（fill/stroke は呼び出し側で行う）
function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h,     x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y,         x + r, y);
  ctx.closePath();
}

// ===== 描画 =====
function render() {
  overlayCtx.clearRect(0, 0, 800, 600);

  if (game.phase === 'prologue')    { renderPrologue();    return; }
  if (game.phase === 'vn')          { renderVN();          return; }
  if (game.phase === 'title')       { renderTitle();       return; }
  if (game.phase === 'stageselect') { renderStageSelect(); return; }
  if (game.phase === 'choice')      { renderChoice();      return; }
  if (game.phase === 'ending')      { renderEnding();      return; }
  if (game.phase === 'billing')     { renderBill();        return; }
  if (game.phase === 'result')      { renderResult();      return; }
  if (game.phase !== 'play' && game.phase !== 'tea') return;

  // ---- ドット絵（背景・ベルト・キャラ） ----
  pixelCtx.fillStyle = '#2a1f14'; pixelCtx.fillRect(0, 0, 200, 110);
  pixelCtx.fillStyle = '#1a1520'; pixelCtx.fillRect(0, 0, 200, UPPER_BELT_Y);
  pixelCtx.fillStyle = '#3d2b18'; pixelCtx.fillRect(0, LOWER_BELT_Y + 10, 200, 110 - (LOWER_BELT_Y + 10));
  for (let y = LOWER_BELT_Y + 14; y < 110; y += 5) drawPixel(0, y, 200, 1, '#4a3520');
  pixelCtx.fillStyle = '#d4c4a8'; pixelCtx.fillRect(0, LOWER_BELT_Y + 10, 200, 12);

  drawBelt(UPPER_BELT_Y, game.time, -1);
  drawBelt(LOWER_BELT_Y, game.time,  1);
  for (const s of game.upper) if (s.x > -8 && s.x < 210) drawNeta(s.x | 0, UPPER_BELT_Y + 2, s.data, true);
  for (const s of game.lower) if (s.x > -8 && s.x < 210) drawNeta(s.x | 0, LOWER_BELT_Y + 2, s.data, false);

  const bcx = 100, bcy = BODY_CENTER_Y;
  drawRightArm(game.handX | 0, bcx, bcy);
  drawLeftArm(bcx, bcy, 75, bcy + 18);
  if (game.phase === 'tea') { drawPixel(74, bcy + 9, 1, 1, '#aaa'); drawPixel(76, bcy + 7, 1, 1, '#bbb'); }
  drawBody(bcx, bcy);
  drawHead(bcx, bcy - 8);
  drawGari(bcx + 32, bcy + 14, game.gari);

  gameCtx.imageSmoothingEnabled = false;
  gameCtx.drawImage(pixelCanvas, 0, 0, 200, 110, 0, PIXEL_OFFSET_Y, 800, 440);

  // 画面フラッシュ
  if (game.flash > 0) {
    overlayCtx.fillStyle = game.flashCol + Math.min(0.35, game.flash * 0.7) + ')';
    overlayCtx.fillRect(0, 0, 800, 600);
  }

  // ネタ名テキスト
  overlayCtx.font = '8px monospace';
  for (const s of game.upper) {
    if (s.x > 5 && s.x < 195) {
      overlayCtx.fillStyle = 'rgba(255,255,255,.3)';
      overlayCtx.fillText(s.data.nm, s.x * PX, PIXEL_OFFSET_Y + UPPER_BELT_Y * PX - 2);
    }
  }
  overlayCtx.font = 'bold 9px monospace';
  for (const s of game.lower) {
    if (s.x > 5 && s.x < 195) {
      const sx = s.x * PX;
      overlayCtx.fillStyle = 'rgba(0,0,0,.55)';
      overlayCtx.fillText(s.data.nm, sx + 1, PIXEL_OFFSET_Y + LOWER_BELT_Y * PX - 2);
      overlayCtx.fillStyle = '#fff';
      overlayCtx.fillText(s.data.nm, sx, PIXEL_OFFSET_Y + LOWER_BELT_Y * PX - 3);
    }
  }

  renderRecommends();

  // 吹き出し
  overlayCtx.textAlign = 'center';
  if (game.bubbleTimer > 0 && game.bubbleText) {
    const by = 280;
    overlayCtx.font = 'bold 16px sans-serif';
    const bw = overlayCtx.measureText(game.bubbleText).width + 28;
    roundedRect(overlayCtx, 400 - bw / 2, by - 4, bw, 32, 6);
    overlayCtx.fillStyle = 'rgba(255,255,255,.95)'; overlayCtx.fill();
    overlayCtx.strokeStyle = '#999'; overlayCtx.lineWidth = 1;
    roundedRect(overlayCtx, 400 - bw / 2, by - 4, bw, 32, 6); overlayCtx.stroke();
    overlayCtx.fillStyle = '#222';
    overlayCtx.fillText(game.bubbleText, 400, by + 18);
  }

  // コンボ表示
  if (game.comboLabelTimer > 0 && game.comboLabel) {
    overlayCtx.textAlign = 'center';
    overlayCtx.font = 'bold 28px sans-serif';
    overlayCtx.strokeStyle = 'rgba(0,0,0,.8)'; overlayCtx.lineWidth = 5;
    overlayCtx.strokeText(game.comboLabel, 400, PIXEL_OFFSET_Y + UPPER_BELT_Y * PX + 10);
    overlayCtx.fillStyle = '#ffd740';
    overlayCtx.fillText(game.comboLabel,   400, PIXEL_OFFSET_Y + UPPER_BELT_Y * PX + 10);
    overlayCtx.lineWidth = 1;
  }

  // 満足度ポップアップ
  for (const p of game.popups) {
    const py = PIXEL_OFFSET_Y + (bcy - 32) * PX - p.y;
    overlayCtx.globalAlpha = Math.min(1, p.life);
    overlayCtx.font = 'bold ' + p.sz + 'px sans-serif';
    overlayCtx.strokeStyle = 'rgba(0,0,0,.8)'; overlayCtx.lineWidth = 4;
    overlayCtx.strokeText(p.txt, 400, py);
    overlayCtx.fillStyle = p.col;
    overlayCtx.fillText(p.txt, 400, py);
    overlayCtx.lineWidth = 1;
    overlayCtx.globalAlpha = 1;
  }

  // ガリ残数
  overlayCtx.font = 'bold 10px monospace';
  overlayCtx.fillStyle = '#ccc';
  overlayCtx.textAlign = 'center';
  overlayCtx.fillText(game.gari + '/3', (bcx + 32) * PX, PIXEL_OFFSET_Y + (bcy + 14) * PX + 18);

  // お茶タイム
  if (game.phase === 'tea') {
    overlayCtx.fillStyle = 'rgba(0,0,0,.3)'; overlayCtx.fillRect(0, 0, 800, 600);
    overlayCtx.fillStyle = '#fff'; overlayCtx.font = 'bold 20px sans-serif'; overlayCtx.textAlign = 'center';
    overlayCtx.fillText('🍵 お茶タイム… ' + Math.ceil(game.teaTimer), 400, 400);
  }

  // ポーズ
  if (game.paused) {
    overlayCtx.fillStyle = 'rgba(0,0,0,.7)'; overlayCtx.fillRect(0, 0, 800, 600);
    overlayCtx.textAlign = 'center';
    overlayCtx.font = 'bold 32px sans-serif'; overlayCtx.fillStyle = '#ffd740'; overlayCtx.fillText('ポーズ', 400, 280);
    overlayCtx.font = 'bold 20px sans-serif';
    overlayCtx.fillStyle = game.pauseSel === 0 ? '#fff' : '#666'; overlayCtx.fillText('▶ 続行',    300, 350);
    overlayCtx.fillStyle = game.pauseSel === 1 ? '#fff' : '#666'; overlayCtx.fillText('▶ やり直し', 500, 350);
    overlayCtx.font = '14px sans-serif'; overlayCtx.fillStyle = '#aaa';
    overlayCtx.fillText('A/D で選択　Space で決定', 400, 410);
  }

  // ステータスバー更新
  const barFull = document.getElementById('barFull');
  const barSat  = document.getElementById('barSat');
  const barIrr  = document.getElementById('barIrr');
  barFull.style.width      = (game.full / 20 * 100) + '%';
  barFull.style.background = game.full < 10 ? '#4caf50' : game.full <= 15 ? '#ffd740' : '#d9534f';
  barSat.style.width       = Math.min(100, game.sat / 1500 * 100) + '%';
  barSat.style.background  = game.decaying ? '#d9534f' : '#f0ad4e';
  barIrr.style.width       = game.irritate + '%';
  barIrr.style.background  = game.irritate < 25 ? '#4caf50' : game.irritate < 50 ? '#ffd740' : '#d9534f';
}

// ===== おすすめパネル =====
function renderRecommends() {
  const UI_BG = '#ab7e4c';

  // 皿カード（6種、横一列）
  const cardW = 122, cardH = 48, cardGap = 5;
  const startX = (800 - (6 * cardW + 5 * cardGap)) / 2;
  overlayCtx.fillStyle = UI_BG;
  overlayCtx.fillRect(0, 0, 800, 52);

  for (let i = 0; i < 6; i++) {
    const rx = startX + i * (cardW + cardGap), ry = 2;

    overlayCtx.fillStyle = '#e0ceb8';
    roundedRect(overlayCtx, rx, ry, cardW, cardH, 5); overlayCtx.fill();
    overlayCtx.strokeStyle = i === 5 ? '#daa520' : PLATE_COLORS[i];
    overlayCtx.lineWidth = 4;
    roundedRect(overlayCtx, rx, ry, cardW, cardH, 5); overlayCtx.stroke();
    overlayCtx.lineWidth = 1;

    // フラッシュオーバーレイ
    if (game.cardFlash[i] > 0) {
      overlayCtx.fillStyle = 'rgba(255,255,255,' + Math.min(0.85, game.cardFlash[i] * 2) + ')';
      roundedRect(overlayCtx, rx, ry, cardW, cardH, 5); overlayCtx.fill();
      overlayCtx.strokeStyle = '#fff'; overlayCtx.lineWidth = 6;
      roundedRect(overlayCtx, rx, ry, cardW, cardH, 5); overlayCtx.stroke();
      overlayCtx.lineWidth = 1;
    }

    overlayCtx.font = 'bold 14px sans-serif';
    overlayCtx.fillStyle = i === 5 ? '#daa520' : PLATE_COLORS[i];
    overlayCtx.textAlign = 'left';
    overlayCtx.fillText(PLATE_NAMES[i], rx + 6, ry + 17);

    overlayCtx.font = 'bold 16px monospace';
    overlayCtx.fillStyle = '#2e1f0e';
    overlayCtx.textAlign = 'right';
    overlayCtx.fillText('×' + game.plateCnt[i], rx + cardW - 6, ry + 17);

    overlayCtx.strokeStyle = 'rgba(255,255,255,.08)'; overlayCtx.lineWidth = 1;
    overlayCtx.beginPath();
    overlayCtx.moveTo(rx + 4, ry + 19); overlayCtx.lineTo(rx + cardW - 4, ry + 19); overlayCtx.stroke();

    overlayCtx.font = 'bold 15px sans-serif';
    overlayCtx.textAlign = 'center';
    overlayCtx.fillStyle = '#000';
    if      (game.cardState[i] === 0) overlayCtx.fillText('？',                    rx + cardW / 2, ry + 38);
    else if (game.cardState[i] === 1) overlayCtx.fillText(game.cardHint[i],        rx + cardW / 2, ry + 38);
    else                              overlayCtx.fillText(game.cardHint[i] + '円', rx + cardW / 2, ry + 38);
  }

  // おすすめパネル（中央）
  const recY = 70, recH = 48, recW = 400;
  const recX = (800 - recW) / 2;
  overlayCtx.fillStyle = UI_BG;
  overlayCtx.fillRect(0, 52, 800, 68);
  overlayCtx.font = 'bold 14px sans-serif'; overlayCtx.fillStyle = '#ffe066'; overlayCtx.textAlign = 'center';
  overlayCtx.fillText('⭐ 本日のおすすめ ⭐', 400, 66);

  const rec = game.recommends ? game.recommends[0] : null;
  overlayCtx.fillStyle = '#e0ceb8';
  roundedRect(overlayCtx, recX, recY, recW, recH, 5); overlayCtx.fill();
  overlayCtx.strokeStyle = rec ? (rec.rk === 5 ? '#daa520' : PLATE_COLORS[rec.rk]) : '#333';
  overlayCtx.lineWidth = 4;
  roundedRect(overlayCtx, recX, recY, recW, recH, 5); overlayCtx.stroke();
  overlayCtx.lineWidth = 1;

  if (rec) {
    const sprW = 32, sprH = 24; // 8px × 4倍, 6px × 4倍
    overlayCtx.font = 'bold 14px sans-serif';
    const nameW       = overlayCtx.measureText(rec.nm).width;
    const contentX    = recX + (recW - (sprW + 8 + nameW)) / 2;
    const sprY        = recY + (recH - sprH) / 2;
    drawSushiToOverlay(rec, contentX, sprY, 4);
    overlayCtx.fillStyle = '#2e1f0e'; overlayCtx.textAlign = 'left';
    overlayCtx.fillText(rec.nm, contentX + sprW + 8, recY + recH / 2 + 5);
  }
  overlayCtx.textAlign = 'center';
}

// ===== ステージ選択画面 =====
function renderStageSelect() {
  const STAGE_NAMES = ['22歳', '30代', '40代', '50代', '定年'];
  gameCtx.fillStyle = '#0a0a12'; gameCtx.fillRect(0, 0, 800, 600);
  overlayCtx.textAlign = 'center';
  overlayCtx.font = 'bold 34px "Hiragino Sans","Meiryo",sans-serif';
  overlayCtx.fillStyle = '#ffd740';
  overlayCtx.fillText('ステージ選択', 400, 110);

  for (let i = 0; i < 5; i++) {
    const bx = 72 + i * 136, by = 180, bw = 116, bh = 200;
    const unlocked = (i + 1) <= unlockedStages;
    const selected  = i === stageSelectCursor;

    overlayCtx.fillStyle = selected ? '#1a1200' : unlocked ? '#0d0d0d' : '#070707';
    overlayCtx.fillRect(bx, by, bw, bh);
    overlayCtx.strokeStyle = selected ? '#ffd740' : unlocked ? '#555' : '#222';
    overlayCtx.lineWidth   = selected ? 3 : 1.5;
    overlayCtx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);

    overlayCtx.font = `bold 13px sans-serif`;
    overlayCtx.fillStyle = unlocked ? (selected ? '#ffd740' : '#aaa') : '#333';
    overlayCtx.fillText(`Stage ${i + 1}`, bx + bw / 2, by + 36);

    overlayCtx.font = `13px "Hiragino Sans","Meiryo",sans-serif`;
    overlayCtx.fillStyle = unlocked ? (selected ? '#ffe680' : '#888') : '#333';
    overlayCtx.fillText(STAGE_NAMES[i], bx + bw / 2, by + 60);

    if (unlocked) {
      const cleared = (i + 1) < unlockedStages;
      overlayCtx.font = 'bold 11px sans-serif';
      overlayCtx.fillStyle = cleared ? '#4caf50' : '#ffd740';
      overlayCtx.fillText(cleared ? 'CLEAR' : 'NEW', bx + bw / 2, by + 88);
    } else {
      overlayCtx.font = 'bold 28px sans-serif';
      overlayCtx.fillStyle = '#333';
      overlayCtx.fillText('🔒', bx + bw / 2, by + 100);
    }
  }

  overlayCtx.font = 'bold 15px sans-serif'; overlayCtx.fillStyle = '#666';
  overlayCtx.fillText('A / D : カーソル移動　　Space : 決定', 400, 430);
  if (currentBgm !== 'title' && audioCtx) startBGM('title');
}

// ===== 選択画面（リトライ or タイトル） =====
function renderChoice() {
  gameCtx.fillStyle = '#0a0a12'; gameCtx.fillRect(0, 0, 800, 600);
  overlayCtx.textAlign = 'center';
  overlayCtx.font = `bold 28px "Hiragino Sans","Meiryo",sans-serif`;
  overlayCtx.fillStyle = '#ffd740';
  overlayCtx.fillText('どうする？', 400, 230);

  const opts = ['もう一回', 'タイトルへ'];
  opts.forEach((label, i) => {
    const cx = 220 + i * 360, cy = 310, bw = 200, bh = 60;
    const sel = game.choiceSel === i;
    overlayCtx.fillStyle = sel ? '#ffd740' : '#1a1a2a';
    overlayCtx.fillRect(cx - bw / 2, cy - bh / 2, bw, bh);
    overlayCtx.strokeStyle = sel ? '#ffd740' : '#444';
    overlayCtx.lineWidth = 2;
    overlayCtx.strokeRect(cx - bw / 2 + 0.5, cy - bh / 2 + 0.5, bw - 1, bh - 1);
    overlayCtx.font = `bold 20px "Hiragino Sans","Meiryo",sans-serif`;
    overlayCtx.fillStyle = sel ? '#1a1200' : '#aaa';
    overlayCtx.fillText(label, cx, cy + 7);
  });

  overlayCtx.font = 'bold 14px sans-serif'; overlayCtx.fillStyle = '#555';
  overlayCtx.fillText('A / D : 選択　　Space : 決定', 400, 420);
}

// ===== エンディング画面 =====
function renderEnding() {
  gameCtx.fillStyle = '#000'; gameCtx.fillRect(0, 0, 800, 600);
  overlayCtx.textAlign = 'center';
  overlayCtx.font = `bold 72px "Hiragino Sans","Meiryo",sans-serif`;
  overlayCtx.fillStyle = '#ffd740';
  overlayCtx.fillText('FIN', 400, 310);
  if (game.endingReady) {
    overlayCtx.font = 'bold 18px sans-serif'; overlayCtx.fillStyle = '#888';
    if (Math.sin(performance.now() / 400) > 0.2) overlayCtx.fillText('▶ 何かキーを押してください', 400, 400);
  }
}

// ===== プロローグ画面（起動直後）=====
function renderPrologue() {
  gameCtx.fillStyle = '#000';
  gameCtx.fillRect(0, 0, 800, 600);
  overlayCtx.textAlign = 'center';
  overlayCtx.font = '22px "Hiragino Sans","Meiryo",sans-serif';
  overlayCtx.fillStyle = 'rgba(255,255,255,0.6)';
  overlayCtx.fillText('俺の寿司の話をしよう。', 400, 270);
  overlayCtx.fillText('長い、長い話だ。', 400, 310);
  overlayCtx.font = '13px sans-serif';
  overlayCtx.fillStyle = '#444';
  if (Math.sin(performance.now() / 600) > 0) {
    overlayCtx.fillText('press any key', 400, 430);
  }
}

// ===== タイトル画面 =====
function renderTitle() {
  pixelCtx.fillStyle = '#0a0828'; pixelCtx.fillRect(0, 0, 200, 110);
  const now = performance.now() / 1000;
  drawBelt(LOWER_BELT_Y, now,  1);
  drawBelt(UPPER_BELT_Y, now, -1);
  for (let i = 0; i < 7; i++) drawNeta(10  + i * 28, LOWER_BELT_Y + 2, NETA_LIST[i * 3 % NETA_LIST.length],       false);
  for (let i = 0; i < 6; i++) drawNeta(185 - i * 35, UPPER_BELT_Y + 2, NETA_LIST[(i * 4 + 2) % NETA_LIST.length], true);
  gameCtx.imageSmoothingEnabled = false;
  gameCtx.drawImage(pixelCanvas, 0, 0, 200, 110, 0, 0, 800, 600);

  overlayCtx.textAlign = 'center';
  overlayCtx.font = 'bold 64px "Hiragino Sans","Meiryo",sans-serif';
  overlayCtx.strokeStyle = '#5d3a00'; overlayCtx.lineWidth = 4; overlayCtx.strokeText('俺の寿司', 400, 250);
  overlayCtx.fillStyle = '#ffd740'; overlayCtx.fillText('俺の寿司', 400, 250);
  overlayCtx.font = 'bold 18px sans-serif'; overlayCtx.fillStyle = '#ffe680';
  overlayCtx.fillText('〜時価の回転寿司で、ざっくり三千円くらいで満足したい！！〜', 400, 290);
  overlayCtx.font = 'bold 20px sans-serif';
  overlayCtx.fillStyle = '#ffd740';
  if (Math.sin(performance.now() / 400) > 0.2) overlayCtx.fillText('▶ 何かキーを押したら始まります', 400, 380);
  overlayCtx.font = 'bold 17px sans-serif'; overlayCtx.fillStyle = '#fff';
  overlayCtx.fillText('A/D：左右　Space：掴む　Z：お茶　E：ガリ　Q：会計', 400, 450);
  if (titleFlashTimer > 0) {
    overlayCtx.fillStyle = `rgba(255,255,255,${(titleFlashTimer / 0.5).toFixed(3)})`;
    overlayCtx.fillRect(0, 0, 800, 600);
  }
  if (currentBgm !== 'title' && audioCtx) startBGM('title');
}

// ===== 会計画面 =====
function renderBill() {
  gameCtx.fillStyle = '#100a04'; gameCtx.fillRect(0, 0, 800, 600);
  overlayCtx.textAlign = 'center';
  overlayCtx.font = 'bold 26px sans-serif'; overlayCtx.fillStyle = '#ffd740'; overlayCtx.fillText('お 会 計', 400, 80);
  overlayCtx.font = 'bold 13px sans-serif'; overlayCtx.fillStyle = '#ddd'; overlayCtx.fillText('── 本日の皿価格 ──', 400, 105);

  const positions = [];
  for (let row = 0; row < 2; row++) for (let col = 0; col < 3; col++) positions.push({ x: 80 + col * 240, y: 120 + row * 200 });

  const show   = Math.min(game.billStep, game.eaten.length);
  const groups = [[], [], [], [], [], []];
  for (let i = 0; i < show; i++) { const e = game.eaten[i]; groups[e.ri].push(e); }

  for (let pi = 0; pi < 6; pi++) {
    const { x: px, y: py } = positions[pi];
    overlayCtx.textAlign = 'left';
    if (pi === 5) {
      overlayCtx.fillStyle = '#daa520'; overlayCtx.fillRect(px, py - 6, 14, 14);
      overlayCtx.fillStyle = '#111';    overlayCtx.fillRect(px + 1, py - 5, 12, 12);
    } else {
      overlayCtx.fillStyle = PLATE_COLORS[pi]; overlayCtx.fillRect(px, py - 6, 14, 14);
    }
    overlayCtx.font = 'bold 14px sans-serif'; overlayCtx.fillStyle = '#fff';
    overlayCtx.fillText(PLATE_NAMES[pi] + ' : ' + game.gamePrices[pi] + '円', px + 18, py + 6);
    overlayCtx.font = '12px monospace';
    const group = groups[pi];
    if (!group.length) {
      overlayCtx.fillStyle = '#999'; overlayCtx.fillText('（なし）', px + 10, py + 22);
    } else {
      const cnt = {};
      for (const e of group) cnt[e.neta.nm] = (cnt[e.neta.nm] || 0) + 1;
      let yi = 0;
      for (const nm of Object.keys(cnt)) {
        overlayCtx.fillStyle = '#ddd';
        overlayCtx.fillText(nm + (cnt[nm] > 1 ? ' ×' + cnt[nm] : ''), px + 10, py + 22 + yi * 14);
        yi++;
      }
    }
  }

  if (game.billListDone) {
    overlayCtx.textAlign = 'center';
    overlayCtx.font = 'bold 28px sans-serif'; overlayCtx.fillStyle = '#fff';
    overlayCtx.fillText('合計: ' + game.billTotal + '円', 400, 480);
  }
  if (game.billKeyReady) {
    overlayCtx.textAlign = 'center';
    overlayCtx.font = 'bold 15px sans-serif'; overlayCtx.fillStyle = '#ffd740';
    if (Math.sin(performance.now() / 400) > 0.2) overlayCtx.fillText('▶ 何かキーを押したら、最終結果が出ます', 400, 530);
  }
}

// ===== リザルト画面 =====
function renderResult() {
  gameCtx.fillStyle = '#100a04'; gameCtx.fillRect(0, 0, 800, 600);
  overlayCtx.fillStyle = 'rgba(10,5,2,.95)'; overlayCtx.fillRect(0, 0, 800, 600);
  overlayCtx.textAlign = 'center';
  const over10k = game.billTotal > 10000;

  overlayCtx.font = 'bold 24px sans-serif'; overlayCtx.fillStyle = '#ffd740'; overlayCtx.fillText('結 果 発 表', 400, 80);
  if (game.resultPhase >= 1) { overlayCtx.font = 'bold 16px sans-serif'; overlayCtx.fillStyle = '#ccc'; overlayCtx.fillText('食べた皿数: ' + game.eaten.length + '皿', 400, 120); }
  if (game.resultPhase >= 2) { overlayCtx.font = 'bold 16px sans-serif'; overlayCtx.fillStyle = '#fff'; overlayCtx.fillText('合計金額: ' + game.billTotal + '円', 400, 150); }
  if (game.resultPhase >= 3) { overlayCtx.font = 'bold 16px sans-serif'; overlayCtx.fillStyle = '#f0ad4e'; overlayCtx.fillText('素の満足度: ' + Math.round(game.sat), 400, 180); }

  if (game.resultPhase >= 4) {
    if (over10k) {
      overlayCtx.font = 'bold 15px sans-serif'; overlayCtx.fillStyle = '#f44';
      overlayCtx.fillText('10,000円超過！！', 400, 215);
    } else {
      overlayCtx.font = '14px sans-serif'; overlayCtx.fillStyle = '#bbb';
      const pm = game.priceMult;
      overlayCtx.fillText('価格補正: 3000÷' + game.billTotal + '=×' + pm.toFixed(2) + (pm > 1 ? ' (お得！)' : pm < 1 ? ' (高い…)' : ''), 400, 215);
    }
  }

  if (game.resultPhase >= 5 && !over10k) {
    const pl = game.eaten.length;
    let label = '', color = '#999';
    if      (pl < 10)  { label = '物足りない…（×' + game.fullnessMult.toFixed(2) + '）'; color = '#e8830c'; }
    else if (pl <= 15) { label = '満腹！（補正なし）';                                    color = '#8bc34a'; }
    else               { label = '食べすぎた…！（×' + game.fullnessMult.toFixed(1) + '）'; color = '#e8830c'; }
    overlayCtx.font = '14px sans-serif'; overlayCtx.fillStyle = color;
    overlayCtx.fillText('満腹度補正: ' + pl + '皿 → ' + label, 400, 245);
  }

  if (game.resultPhase >= 6) {
    const sc = game.score;
    overlayCtx.font = 'bold 68px sans-serif';
    overlayCtx.fillStyle = sc === 0 ? '#f44' : '#ffd740';
    overlayCtx.fillText(sc, 400, 340);

    let rankText = '', rankColor = '#ff9800';
    if      (over10k)    { rankText = '無銭飲食：お会計が高すぎる……！ 払えないぞ！！'; rankColor = '#f44';    }
    else if (sc >= 1800) { rankText = '神：究極の寿司体験！！';                         rankColor = '#ffd740'; }
    else if (sc >= 1100) { rankText = '特上：最高の寿司だったな！';                     rankColor = '#ff9800'; }
    else if (sc >= 600)  { rankText = '上：申し分のない寿司だった！';                   rankColor = '#8bc34a'; }
    else if (sc >= 420)  { rankText = '並：まあ……こんなもんかなあ';                     rankColor = '#ccc';    }
    else                 { rankText = '下：あんまり良くなかった……';                     rankColor = '#999';    }

    overlayCtx.font = 'bold 15px sans-serif'; overlayCtx.fillStyle = rankColor;
    const colonIdx = rankText.indexOf('：');
    if (rankText.length > 25) {
      overlayCtx.fillText(rankText.slice(0, colonIdx + 1), 400, 385);
      overlayCtx.font = '13px sans-serif';
      overlayCtx.fillText(rankText.slice(colonIdx + 1), 400, 405);
    } else {
      overlayCtx.fillText(rankText, 400, 390);
    }
  }

  if (game.anyKey) {
    const hint = HINTS[(game.billTotal + game.eaten.length) % HINTS.length];
    overlayCtx.font = '14px sans-serif'; overlayCtx.fillStyle = '#aaa';
    if (hint.length > 38) {
      overlayCtx.fillText(hint.slice(0, 38), 400, 460);
      overlayCtx.fillText(hint.slice(38),    400, 478);
    } else {
      overlayCtx.fillText(hint, 400, 465);
    }
    overlayCtx.font = 'bold 15px sans-serif'; overlayCtx.fillStyle = '#ffd740';
    if (Math.sin(performance.now() / 400) > 0.2) overlayCtx.fillText('なんか押したらもう一回遊べます', 400, 540);
  }
}

// ===== VN描画 =====
function renderVN() {
  // 背景（黒 or 設定色）
  gameCtx.fillStyle = BG_COLORS[vn.bg] || '#000';
  gameCtx.fillRect(0, 0, 800, 600);

  // キャラクタープレースホルダー
  const talking = vn.dialog && vn.dialog.speaker;
  if (vn.leftChar)  drawVNChar(80,  '主人公', vn.leftChar.expression,  talking && vn.dialog.speaker === '親方');
  if (vn.rightChar) drawVNChar(520, '親方',   vn.rightChar.expression, talking && vn.dialog.speaker === '俺');

  // フェードオーバーレイ（キャラの上、ダイアログの下）
  if (vn.fadeAlpha > 0) {
    overlayCtx.fillStyle = `rgba(0,0,0,${vn.fadeAlpha.toFixed(3)})`;
    overlayCtx.fillRect(0, 0, 800, 600);
  }

  // ダイアログ（フェードの上 → 常に見える）
  if (vn.dialog) renderVNDialog();
}

function drawVNChar(x, name, expression, dimmed) {
  const w = 200, h = 370, y = 40;
  const colors = { '主人公': '#2a4a6e', '親方': '#5c3318' };
  overlayCtx.globalAlpha = dimmed ? 0.35 : 1.0;
  overlayCtx.fillStyle = colors[name] || '#444';
  roundedRect(overlayCtx, x, y, w, h, 8); overlayCtx.fill();
  overlayCtx.strokeStyle = 'rgba(255,255,255,0.15)'; overlayCtx.lineWidth = 1;
  roundedRect(overlayCtx, x, y, w, h, 8); overlayCtx.stroke();
  overlayCtx.fillStyle = 'rgba(255,255,255,0.7)';
  overlayCtx.font = 'bold 16px sans-serif'; overlayCtx.textAlign = 'center';
  overlayCtx.fillText(name, x + w / 2, y + h / 2 - 8);
  overlayCtx.font = '13px sans-serif'; overlayCtx.fillStyle = 'rgba(255,255,255,0.4)';
  overlayCtx.fillText(expression, x + w / 2, y + h / 2 + 14);
  overlayCtx.globalAlpha = 1;
}

function renderVNDialog() {
  const { speaker, text } = vn.dialog;
  const bx = 20, by = 432, bw = 760, bh = 148;

  // ボックス背景
  overlayCtx.fillStyle = 'rgba(0,0,0,0.88)';
  roundedRect(overlayCtx, bx, by, bw, bh, 8); overlayCtx.fill();
  overlayCtx.strokeStyle = 'rgba(255,215,0,0.35)'; overlayCtx.lineWidth = 1;
  roundedRect(overlayCtx, bx, by, bw, bh, 8); overlayCtx.stroke();

  // 話者名
  let textY = by + 26;
  if (speaker) {
    overlayCtx.font = 'bold 16px sans-serif'; overlayCtx.fillStyle = '#ffd740';
    overlayCtx.textAlign = 'left';
    overlayCtx.fillText(speaker, bx + 18, by + 24);
    textY = by + 50;
  }

  // 本文（改行対応）
  overlayCtx.font = '18px sans-serif'; overlayCtx.fillStyle = '#fff';
  overlayCtx.textAlign = 'left';
  text.split('\n').forEach((line, i) => {
    overlayCtx.fillText(line.trim(), bx + 18, textY + i * 28);
  });

  // 次へ▼（フェード完了後のみ点滅）
  const fadeDone = Math.abs(vn.fadeAlpha - vn.fadeTarget) < 0.01;
  if (fadeDone && Math.sin(performance.now() / 320) > 0) {
    overlayCtx.font = '14px sans-serif'; overlayCtx.fillStyle = '#ffd740';
    overlayCtx.textAlign = 'right';
    overlayCtx.fillText('▼', bx + bw - 14, by + bh - 10);
  }
}

// ===== メインループ =====
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t => { lastTime = t; loop(t); });

</script>
</body>
</html>
